{% extends 'adminpanel/base_admin.html' %}
{% block title %}Add Funds – Admin | CryptoVest{% endblock %}
{% block page_title %}Add Funds{% endblock %}
{% block admin_content %}
<div class="max-w-lg mx-auto glass rounded-2xl p-8 border border-white/5">
  <h2 class="font-display text-xl font-bold text-white mb-4">Add Funds to User</h2>
  <form method="post" class="space-y-5">
    {% csrf_token %}
    <div>
      <label class="text-slate-400 text-xs uppercase tracking-wider mb-1.5 block font-medium">Select User</label>
      <select name="user_id" required class="w-full px-4 py-3 rounded-xl text-white focus:outline-none" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);">
        <option value="">-- Select User --</option>
        {% for user in users %}
        <option value="{{ user.id }}">{{ user.username }} ({{ user.email }})</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="text-slate-400 text-xs uppercase tracking-wider mb-1.5 block font-medium">Amount (USD)</label>
      <input type="number" name="amount" step="0.01" min="0.01" required placeholder="e.g. 500" class="w-full px-4 py-3 rounded-xl text-white focus:outline-none placeholder-slate-600" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);">
    </div>
    <button type="submit" class="btn-green w-full py-3.5 rounded-xl font-bold text-sm"><i class="fas fa-plus-circle mr-2"></i>Add Funds</button>
  </form>
</div>
{% endblock %}
